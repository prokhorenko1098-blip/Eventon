<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Eventon</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0f;
    --surface: #111318;
    --surface2: #181c24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f2f8;
    --muted: #6b7280;
    --yes: #00e5a0;
    --yes-dim: rgba(0,229,160,0.12);
    --no: #ff4d6a;
    --no-dim: rgba(255,77,106,0.12);
    --accent: #5b8af0;
    --accent-dim: rgba(91,138,240,0.15);
    --ton: #0098ea;
    --gold: #f5c842;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); font-family: 'Geist', sans-serif; color: var(--text); }

  #app { height: 100vh; display: flex; flex-direction: column; position: relative; overflow: hidden; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease; }
  .screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .screen.slide-left { transform: translateX(-30%); opacity: 0; pointer-events: none; }

  .scroll-body { flex: 1; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
  .scroll-body::-webkit-scrollbar { display: none; }

  .header { padding: 16px 16px 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; background: linear-gradient(to bottom, var(--bg), transparent); position: relative; z-index: 2; }
  .header-back { width: 36px; height: 36px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .header-back:active { transform: scale(0.92); background: var(--surface2); }
  .header-title { font-family: 'Clash Display', sans-serif; font-size: 18px; font-weight: 600; flex: 1; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .bottom-nav { height: 68px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; flex-shrink: 0; padding: 0 8px; padding-bottom: env(safe-area-inset-bottom); }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 0; cursor: pointer; transition: all 0.15s; opacity: 0.45; }
  .nav-item.active { opacity: 1; }
  .nav-item:active { transform: scale(0.9); }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }
  .nav-item.active .nav-label { color: var(--accent); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all 0.2s; }
  .card:active { transform: scale(0.98); border-color: var(--border2); }

  .market-card { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .market-card-top { display: flex; align-items: flex-start; gap: 10px; }
  .market-emoji { width: 40px; height: 40px; background: var(--surface2); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .market-info { flex: 1; min-width: 0; }
  .market-category { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .market-title { font-family: 'Clash Display', sans-serif; font-size: 15px; font-weight: 600; line-height: 1.3; }
  .market-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .market-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--yes), #00c4d4); transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .market-meta { display: flex; align-items: center; justify-content: space-between; }
  .market-prob { display: flex; align-items: center; gap: 12px; }
  .prob-yes { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 600; color: var(--yes); }
  .prob-no { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 500; color: var(--no); }
  .market-vol { font-size: 11px; color: var(--muted); }
  .market-deadline { font-size: 11px; color: var(--muted); }

  .tabs { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; flex-shrink: 0; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 7px 14px; border-radius: 99px; font-size: 12px; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); background: var(--surface); color: var(--muted); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:active { transform: scale(0.95); }

  .hero { padding: 0 16px 20px; }
  .hero-inner { background: linear-gradient(135deg, #0f1629 0%, #111827 50%, #0a1220 100%); border: 1px solid rgba(91,138,240,0.2); border-radius: 20px; padding: 20px; position: relative; overflow: hidden; }
  .hero-inner::before { content: ''; position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(91,138,240,0.15) 0%, transparent 70%); pointer-events: none; }
  .hero-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .hero-value { font-family: 'Clash Display', sans-serif; font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .hero-sub { font-size: 12px; color: var(--muted); }
  .hero-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .hero-stat { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 10px; }
  .hero-stat-val { font-family: 'Geist Mono', monospace; font-size: 16px; font-weight: 600; color: var(--yes); }
  .hero-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .feed { display: flex; flex-direction: column; gap: 10px; padding: 0 16px 16px; }

  .detail-hero { padding: 0 16px 16px; }
  .detail-hero-inner { background: var(--surface2); border-radius: 20px; padding: 20px; }
  .detail-emoji-big { font-size: 40px; margin-bottom: 12px; }
  .detail-cat { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .detail-title { font-family: 'Clash Display', sans-serif; font-size: 20px; font-weight: 700; line-height: 1.3; margin-bottom: 16px; }
  .detail-prob-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .prob-badge { padding: 6px 14px; border-radius: 99px; font-family: 'Geist Mono', monospace; font-size: 16px; font-weight: 700; }
  .prob-badge.yes { background: var(--yes-dim); color: var(--yes); }
  .prob-badge.no { background: var(--no-dim); color: var(--no); }
  .prob-label { font-size: 12px; color: var(--muted); }
  .detail-bar { height: 8px; background: var(--surface); border-radius: 99px; overflow: hidden; margin-bottom: 12px; }
  .detail-bar-fill { height: 100%; background: linear-gradient(90deg, var(--yes), #00c4d4); border-radius: 99px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .detail-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .detail-stat { background: var(--surface); border-radius: 10px; padding: 10px; text-align: center; }
  .detail-stat-val { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 600; color: var(--text); }
  .detail-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .chart-section { padding: 0 16px 16px; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
  canvas.chart { width: 100%; height: 120px; display: block; }

  .bet-section { padding: 0 16px 16px; }
  .bet-choice { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .bet-btn { padding: 14px; border-radius: 14px; border: 2px solid transparent; font-family: 'Clash Display', sans-serif; font-size: 16px; font-weight: 700; text-align: center; cursor: pointer; transition: all 0.2s; }
  .bet-btn.yes { background: var(--yes-dim); color: var(--yes); border-color: rgba(0,229,160,0.2); }
  .bet-btn.yes.selected { background: var(--yes); color: #000; border-color: var(--yes); }
  .bet-btn.no { background: var(--no-dim); color: var(--no); border-color: rgba(255,77,106,0.2); }
  .bet-btn.no.selected { background: var(--no); color: #fff; border-color: var(--no); }
  .amount-input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .amount-input input { flex: 1; background: none; border: none; outline: none; font-family: 'Geist Mono', monospace; font-size: 22px; font-weight: 600; color: var(--text); width: 0; }
  .amount-input input::placeholder { color: var(--muted); }
  .amount-currency { font-size: 13px; font-weight: 600; color: var(--ton); }
  .quick-amounts { display: flex; gap: 6px; margin-bottom: 14px; }
  .quick-btn { flex: 1; padding: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s; }
  .quick-btn:active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); transform: scale(0.95); }
  .bet-preview { background: var(--surface2); border-radius: 12px; padding: 12px 14px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 6px; }
  .bet-preview-row { display: flex; justify-content: space-between; align-items: center; }
  .bet-preview-label { font-size: 12px; color: var(--muted); }
  .bet-preview-val { font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 600; color: var(--text); }
  .bet-preview-val.yes { color: var(--yes); }
  .cta-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: 14px; font-family: 'Clash Display', sans-serif; font-size: 17px; font-weight: 700; color: #fff; cursor: pointer; transition: all 0.2s; }
  .cta-btn:active { transform: scale(0.97); opacity: 0.9; }
  .cta-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .cta-btn.yes-btn { background: var(--yes); color: #000; }
  .cta-btn.no-btn { background: var(--no); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 24px; }
  .overlay.active { opacity: 1; pointer-events: all; }
  .overlay-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 24px; padding: 32px 24px; text-align: center; width: 100%; max-width: 340px; }
  .overlay-icon { font-size: 56px; margin-bottom: 16px; animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
  .overlay-title { font-family: 'Clash Display', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .overlay-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.5; }
  .overlay-detail { background: var(--surface2); border-radius: 12px; padding: 14px; margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }
  .overlay-row { display: flex; justify-content: space-between; }
  .overlay-lbl { font-size: 12px; color: var(--muted); }
  .overlay-val { font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 600; }

  .portfolio-header { padding: 0 16px 16px; }
  .balance-card { background: linear-gradient(135deg, #0d1f3c, #0f2040); border: 1px solid rgba(0,152,234,0.25); border-radius: 20px; padding: 22px; }
  .balance-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ton); margin-bottom: 6px; }
  .balance-amount { font-family: 'Clash Display', sans-serif; font-size: 38px; font-weight: 700; color: #fff; }
  .balance-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .balance-pnl { display: flex; align-items: center; gap: 6px; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
  .pnl-positive { color: var(--yes); font-family: 'Geist Mono', monospace; font-size: 15px; font-weight: 600; }
  .pnl-label { font-size: 12px; color: var(--muted); }
  .positions-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .position-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .position-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .position-emoji { font-size: 22px; }
  .position-title { font-size: 13px; font-weight: 600; line-height: 1.3; flex: 1; }
  .position-side { padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; }
  .position-side.yes { background: var(--yes-dim); color: var(--yes); }
  .position-side.no { background: var(--no-dim); color: var(--no); }
  .position-bottom { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
  .pos-stat { background: var(--surface2); border-radius: 8px; padding: 8px; }
  .pos-stat-val { font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 600; }
  .pos-stat-lbl { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .pos-stat-val.green { color: var(--yes); }
  .pos-stat-val.red { color: var(--no); }

  .lb-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .lb-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; }
  .lb-rank { font-family: 'Geist Mono', monospace; font-size: 15px; font-weight: 700; width: 28px; text-align: center; flex-shrink: 0; }
  .lb-rank.gold { color: var(--gold); }
  .lb-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .lb-name { flex: 1; font-size: 14px; font-weight: 600; }
  .lb-profit { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 700; color: var(--yes); }
  .lb-accuracy { font-size: 11px; color: var(--muted); text-align: right; }

  .fade-in { animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .stagger > * { animation: fadeIn 0.4s ease both; }
  .stagger > *:nth-child(1) { animation-delay: 0.05s; }
  .stagger > *:nth-child(2) { animation-delay: 0.10s; }
  .stagger > *:nth-child(3) { animation-delay: 0.15s; }
  .stagger > *:nth-child(4) { animation-delay: 0.20s; }
  .stagger > *:nth-child(5) { animation-delay: 0.25s; }

  @keyframes flashGreen { 0%,100% { background: transparent; } 50% { background: rgba(0,229,160,0.15); } }
  .flash { animation: flashGreen 0.6s ease; }

  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--yes); box-shadow: 0 0 6px var(--yes); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.6; } }

  /* ══ LANGUAGE SCREEN ══ */
  #screen-lang {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    z-index: 200;
  }
  .lang-logo {
    font-family: 'Clash Display', sans-serif;
    font-size: 42px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }
  .lang-logo span { color: var(--accent); }
  .lang-tagline {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 52px;
    text-align: center;
  }
  .lang-prompt {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .lang-options { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  .lang-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 18px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .lang-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-dim), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .lang-btn:hover::before, .lang-btn:active::before { opacity: 1; }
  .lang-btn:active { transform: scale(0.97); border-color: var(--accent); }
  .lang-flag { font-size: 32px; line-height: 1; flex-shrink: 0; }
  .lang-text { flex: 1; }
  .lang-name { font-family: 'Clash Display', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
  .lang-native { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .lang-arrow { color: var(--muted); font-size: 18px; }

  /* splash animation */
  #screen-lang .lang-logo { animation: splashLogo 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }
  #screen-lang .lang-tagline { animation: fadeIn 0.5s 0.3s ease both; }
  #screen-lang .lang-prompt { animation: fadeIn 0.5s 0.5s ease both; }
  #screen-lang .lang-options { animation: fadeIn 0.5s 0.6s ease both; }
  @keyframes splashLogo {
    from { transform: scale(0.5) translateY(20px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* globe decoration */
  .lang-globe {
    width: 80px; height: 80px;
    background: radial-gradient(circle at 35% 35%, rgba(91,138,240,0.3), rgba(91,138,240,0.05));
    border: 1px solid rgba(91,138,240,0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    margin-bottom: 24px;
    animation: splashLogo 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    box-shadow: 0 0 40px rgba(91,138,240,0.15);
  }

  /* lang switcher in header */
  .lang-switcher {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-switcher:active { background: var(--surface2); }
</style>
</head>
<body>
<div id="app">

  <!-- ══ SCREEN: LANGUAGE SELECT ══ -->
  <div class="screen" id="screen-lang">
    <div class="lang-globe">🌐</div>
    <div class="lang-logo">Event<span>on</span></div>
    <div class="lang-tagline">Prediction markets · TON blockchain</div>
    <div class="lang-prompt" id="lang-prompt">Choose your language</div>
    <div class="lang-options">
      <div class="lang-btn" onclick="selectLang('uk')">
        <div class="lang-flag">🇺🇦</div>
        <div class="lang-text">
          <div class="lang-name">Українська</div>
          <div class="lang-native">Ukrainian</div>
        </div>
        <div class="lang-arrow">›</div>
      </div>
      <div class="lang-btn" onclick="selectLang('ru')">
        <div class="lang-flag">🇷🇺</div>
        <div class="lang-text">
          <div class="lang-name">Русский</div>
          <div class="lang-native">Russian</div>
        </div>
        <div class="lang-arrow">›</div>
      </div>
      <div class="lang-btn" onclick="selectLang('en')">
        <div class="lang-flag">🇬🇧</div>
        <div class="lang-text">
          <div class="lang-name">English</div>
          <div class="lang-native">English</div>
        </div>
        <div class="lang-arrow">›</div>
      </div>
    </div>
  </div>

  <!-- ══ SCREEN: HOME ══ -->
  <div class="screen hidden" id="screen-home">
    <div style="padding: 16px 16px 0; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;">
      <div>
        <div style="font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;" id="home-greeting"></div>
        <div style="font-family:'Clash Display',sans-serif;font-size:22px;font-weight:700;">Event<span style="color:var(--accent)">on</span></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="live-dot"></div>
        <span style="font-size:11px;color:var(--muted);font-weight:600;">LIVE</span>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:6px 12px;font-size:12px;font-weight:600;color:var(--ton);display:flex;align-items:center;gap:5px;">
          <span>◈</span><span>245.8</span>
        </div>
        <div class="lang-switcher" id="lang-flag-btn" onclick="showLangScreen()"></div>
      </div>
    </div>

    <div class="scroll-body">
      <div class="hero" style="padding-top:14px;">
        <div class="hero-inner">

// ── RENDER ─────────────────────────────────────────────────────────

  `).join('');
}

  const markets = filter === 'all' ? t.markets : t.markets.filter(m => m.cat === filter);

    const d = MARKET_DATA[m.id];

    <div class="card market-card" onclick="openMarket(${m.id})">

        <div class="market-info">

        </div>

        </div>

// ── NAVIGATION ─────────────────────────────────────────────────────
function showScreen(name) {
  const from = document.getElementById('screen-'+currentScreen);
  from.classList.add('slide-left');
  setTimeout(() => { from.classList.add('hidden'); from.classList.remove('slide-left'); }, 350);
  prevScreen = currentScreen;
  currentScreen = name;
  document.getElementById('screen-'+name).classList.remove('hidden','slide-left');
}

function goBack() {
  const from = currentScreen;
  const el = document.getElementById('screen-'+from);
  el.style.transform = 'translateX(100%)';
  el.style.opacity = '0';
  setTimeout(() => { el.classList.add('hidden'); el.style.transform=''; el.style.opacity=''; }, 350);
  currentScreen = prevScreen === from ? 'home' : prevScreen;
  prevScreen = 'home';
  document.getElementById('screen-'+currentScreen).classList.remove('hidden','slide-left');
}

// ── MARKET DETAIL ──────────────────────────────────────────────────
function openMarket(id) {
  const t = T[lang];
  const m = t.markets.find(x => x.id === id);
  const d = MARKET_DATA[id];
  currentMarketId = id;
  selectedSide = null;
  document.getElementById('amount-input').value = '';

  document.getElementById('d-emoji').textContent = m.emoji;
  document.getElementById('d-cat').textContent = t.catLabels[m.cat].toUpperCase();
  document.getElementById('d-title').textContent = m.title;
  document.getElementById('d-yes-prob').textContent = d.yes + '%';
  document.getElementById('d-no-prob').textContent = (100-d.yes) + '%';
  document.getElementById('d-bar').style.width = d.yes + '%';
  document.getElementById('d-vol').textContent = d.vol.toLocaleString();
  document.getElementById('d-trades').textContent = d.trades.toLocaleString();
  document.getElementById('d-deadline').textContent = d.deadline + (lang==='en'?' days':' дн');
  document.getElementById('detail-header-title').textContent = t.catLabels[m.cat];
  document.getElementById('btn-yes').className = 'bet-btn yes';
  document.getElementById('btn-no').className = 'bet-btn no';
  document.getElementById('btn-yes').textContent = t.btnYes;
  document.getElementById('btn-no').textContent = t.btnNo;
  document.getElementById('place-bet-btn').disabled = true;
  document.getElementById('place-bet-btn').className = 'cta-btn';
  document.getElementById('place-bet-btn').textContent = t.betPlaceholder;
  updatePreviewDisplay(null, null);

  prevScreen = currentScreen;
  currentScreen = 'detail';
  document.getElementById('screen-detail').classList.remove('hidden','slide-left');
  const home = document.getElementById('screen-'+prevScreen);
  home.classList.add('slide-left');
  setTimeout(() => { home.classList.add('hidden'); home.classList.remove('slide-left'); }, 350);

  drawChart(d.history);
}

// ── CHART ──────────────────────────────────────────────────────────
function drawChart(data) {
  setTimeout(() => {
    const canvas = document.getElementById('price-chart');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = rect.width * dpr; canvas.height = 120 * dpr;
    canvas.style.width = rect.width + 'px'; canvas.style.height = '120px';
    ctx.scale(dpr, dpr);
    const w = rect.width, h = 120;
    ctx.clearRect(0,0,w,h);
    const pts = data.map((v,i) => ({ x:(i/(data.length-1))*w, y:h-((v/100)*h*0.8+h*0.1) }));
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,'rgba(0,229,160,0.3)'); grad.addColorStop(1,'rgba(0,229,160,0)');
    ctx.beginPath(); ctx.moveTo(pts[0].x,h);
    pts.forEach(p => ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,h); ctx.closePath();
    ctx.fillStyle=grad; ctx.fill();
    ctx.beginPath(); pts.forEach((p,i) => i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
    ctx.strokeStyle='#00e5a0'; ctx.lineWidth=2.5; ctx.lineJoin='round'; ctx.stroke();
    const last=pts[pts.length-1];
    ctx.beginPath(); ctx.arc(last.x,last.y,5,0,Math.PI*2); ctx.fillStyle='#00e5a0'; ctx.fill();
    ctx.beginPath(); ctx.arc(last.x,last.y,9,0,Math.PI*2); ctx.fillStyle='rgba(0,229,160,0.25)'; ctx.fill();
  }, 80);
}

// ── BET LOGIC ──────────────────────────────────────────────────────
function selectSide(side) {
  const t = T[lang];
  selectedSide = side;
  document.getElementById('btn-yes').classList.toggle('selected', side==='yes');
  document.getElementById('btn-no').classList.toggle('selected', side==='no');
  const btn = document.getElementById('place-bet-btn');
  btn.className = 'cta-btn ' + side + '-btn';
  btn.textContent = side === 'yes' ? t.betYes : t.betNo;
  const amt = parseFloat(document.getElementById('amount-input').value);
  btn.disabled = !amt || amt < 0.5;
  updatePreview();
}

function setAmount(v) {
  document.getElementById('amount-input').value = v;
  updatePreview();
  if (selectedSide) document.getElementById('place-bet-btn').disabled = false;
}

function updatePreview() {
  const amt = parseFloat(document.getElementById('amount-input').value) || 0;
  if (selectedSide && amt >= 0.5) document.getElementById('place-bet-btn').disabled = false;
  updatePreviewDisplay(selectedSide, amt);
}

function updatePreviewDisplay(side, amt) {
  if (!side || !amt) {
    document.getElementById('prev-amount').textContent = '— TON';
    document.getElementById('prev-win').textContent = '— TON';
    document.getElementById('prev-profit').textContent = '—';
    document.getElementById('prev-fee').textContent = '—';
    return;
  }
  const d = MARKET_DATA[currentMarketId];
  const prob = side==='yes' ? d.yes/100 : (100-d.yes)/100;
  const fee = amt*0.02, net = amt-fee, tokens = net/prob;
  document.getElementById('prev-amount').textContent = amt.toFixed(2)+' TON';
  document.getElementById('prev-win').textContent = tokens.toFixed(2)+' TON';
  document.getElementById('prev-profit').textContent = '+'+(tokens-amt).toFixed(2)+' TON';
  document.getElementById('prev-fee').textContent = fee.toFixed(3)+' TON';
}

function placeBet() {
  const t = T[lang];
  const amt = parseFloat(document.getElementById('amount-input').value);
  if (!selectedSide || !amt || amt<0.5) return;
  const d = MARKET_DATA[currentMarketId];
  const m = T[lang].markets.find(x=>x.id===currentMarketId);
  const prob = selectedSide==='yes' ? d.yes/100 : (100-d.yes)/100;
  const tokens = (amt*0.98)/prob;
  const profit = tokens - amt;
  const sideLabel = selectedSide==='yes' ? t.yesLabel : t.noLabel;
  document.getElementById('overlay-sub').textContent = t.overlaySub;
  document.getElementById('overlay-detail').innerHTML = `
    <div class="overlay-row"><span class="overlay-lbl">${t.overlayEvent}</span><span class="overlay-val" style="max-width:55%;text-align:right;font-size:11px;font-family:'Geist',sans-serif">${m.emoji} ${m.title.slice(0,38)}…</span></div>
    <div class="overlay-row"><span class="overlay-lbl">${t.overlayPos}</span><span class="overlay-val" style="color:${selectedSide==='yes'?'var(--yes)':'var(--no)'}">${sideLabel}</span></div>
    <div class="overlay-row"><span class="overlay-lbl">${t.overlaySpent}</span><span class="overlay-val">${amt.toFixed(2)} TON</span></div>
    <div class="overlay-row"><span class="overlay-lbl">${t.overlayTokens}</span><span class="overlay-val">${tokens.toFixed(2)}</span></div>
    <div class="overlay-row"><span class="overlay-lbl">${t.overlayPotential}</span><span class="overlay-val" style="color:var(--yes)">+${profit.toFixed(2)} TON</span></div>
  `;
  document.getElementById('success-overlay').classList.add('active');
}

function closeOverlay() {
  document.getElementById('success-overlay').classList.remove('active');
  document.getElementById('amount-input').value = '';
  selectedSide = null;
  const t = T[lang];
  document.getElementById('btn-yes').className = 'bet-btn yes';
  document.getElementById('btn-no').className = 'bet-btn no';
  document.getElementById('btn-yes').textContent = t.btnYes;
  document.getElementById('btn-no').textContent = t.btnNo;
  document.getElementById('place-bet-btn').disabled = true;
  document.getElementById('place-bet-btn').className = 'cta-btn';
  document.getElementById('place-bet-btn').textContent = t.betPlaceholder;
  updatePreviewDisplay(null, null);
}

function filterTab(el, filter) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentFilter = filter;
  renderFeed(filter);
}

// ── LIVE PRICE UPDATE ──────────────────────────────────────────────
setInterval(() => {
  Object.keys(MARKET_DATA).forEach(id => {
    const d = MARKET_DATA[id];
    d.yes = Math.max(2, Math.min(98, d.yes + (Math.random()-0.5)*2));
    d.history.push(d.yes);
    if (d.history.length > 12) d.history.shift();
  });
  if (currentScreen==='home') renderFeed(currentFilter);
  if (currentScreen==='detail' && currentMarketId) {
    const d = MARKET_DATA[currentMarketId];
    const t = T[lang];
    document.getElementById('d-yes-prob').textContent = d.yes.toFixed(0)+'%';
    document.getElementById('d-no-prob').textContent = (100-d.yes).toFixed(0)+'%';
    document.getElementById('d-bar').style.width = d.yes+'%';
    drawChart(d.history);
    updatePreview();
  }
}, 3000);

// ── INIT ───────────────────────────────────────────────────────────
applyTranslations();
</script>
