<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventon Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
.header { background: #1a1d27; border-bottom: 1px solid #2d3148; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 700; }
.header h1 span { color: #5b8af0; }
.badge { background: #2d3148; color: #6b7280; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
.container { max-width: 1200px; margin: 0 auto; padding: 24px; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; padding: 20px; }
.stat-val { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.stat-lbl { font-size: 12px; color: #6b7280; }
.stat.blue .stat-val { color: #5b8af0; }
.stat.green .stat-val { color: #00e5a0; }
.stat.purple .stat-val { color: #a78bfa; }
.stat.orange .stat-val { color: #f59e0b; }
.section { background: #1a1d27; border: 1px solid #2d3148; border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
.section-header { padding: 16px 20px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.section-title { font-size: 15px; font-weight: 700; }
.filters { display: flex; gap: 8px; }
.filter-select { background: #0f1117; border: 1px solid #2d3148; color: #e2e8f0; padding: 6px 10px; border-radius: 8px; font-size: 13px; }
input.search { background: #0f1117; border: 1px solid #2d3148; color: #e2e8f0; padding: 6px 12px; border-radius: 8px; font-size: 13px; width: 220px; }
input.search::placeholder { color: #6b7280; }
table { width: 100%; border-collapse: collapse; }
th { padding: 10px 16px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.05em; color: #6b7280; text-transform: uppercase; border-bottom: 1px solid #2d3148; }
td { padding: 12px 16px; border-bottom: 1px solid #1e2235; font-size: 13px; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }
.market-title { font-weight: 500; max-width: 300px; }
.market-sub { font-size: 11px; color: #6b7280; margin-top: 2px; }
.prob-bar { display: flex; align-items: center; gap: 8px; }
.prob-track { flex: 1; height: 4px; background: #2d3148; border-radius: 2px; max-width: 80px; }
.prob-fill { height: 100%; background: #00e5a0; border-radius: 2px; }
.actions { display: flex; gap: 6px; flex-wrap: wrap; }
.btn { padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(0.96); }
.btn-yes { background: rgba(0,229,160,0.15); color: #00e5a0; border: 1px solid rgba(0,229,160,0.3); }
.btn-no { background: rgba(255,77,106,0.15); color: #ff4d6a; border: 1px solid rgba(255,77,106,0.3); }
.btn-pause { background: rgba(107,114,128,0.15); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }
.cat-politics { background: rgba(139,92,246,0.1); color: #a78bfa; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
.cat-crypto { background: rgba(245,158,11,0.1); color: #f59e0b; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
.cat-sport { background: rgba(59,130,246,0.1); color: #60a5fa; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
.cat-culture { background: rgba(236,72,153,0.1); color: #f472b6; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
.loading { text-align: center; padding: 40px; color: #6b7280; }
.empty { text-align: center; padding: 40px; color: #6b7280; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-bg.show { display: flex; }
.modal { background: #1a1d27; border: 1px solid #2d3148; border-radius: 16px; padding: 28px; max-width: 440px; width: 90%; text-align: center; }
.modal-icon { font-size: 40px; margin-bottom: 12px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: #6b7280; margin-bottom: 24px; line-height: 1.5; white-space: pre-line; }
.modal-actions { display: flex; gap: 10px; justify-content: center; }
.btn-cancel { background: #2d3148; color: #9ca3af; padding: 10px 24px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn-confirm { background: #5b8af0; color: #fff; padding: 10px 24px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 500; transition: transform 0.3s; z-index: 200; max-width: 500px; text-align: center; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: rgba(0,229,160,0.4); color: #00e5a0; }
.toast.error { border-color: rgba(255,77,106,0.4); color: #ff4d6a; }
.archive-item { padding: 16px 20px; border-bottom: 1px solid #1e2235; }
.archive-item:last-child { border-bottom: none; }
.result-yes { color: #00e5a0; font-weight: 700; }
.result-no { color: #ff4d6a; font-weight: 700; }
</style>
</head>
<body>

<div class="header">
  <h1>Event<span>on</span></h1>
  <span class="badge">ADMIN PANEL</span>
</div>

<div class="container">
  <div class="stats">
    <div class="stat blue"><div class="stat-val" id="s-markets">—</div><div class="stat-lbl">Активных рынков</div></div>
    <div class="stat green"><div class="stat-val" id="s-tvl">—</div><div class="stat-lbl">TVL (TON)</div></div>
    <div class="stat purple"><div class="stat-val" id="s-users">—</div><div class="stat-lbl">Пользователей</div></div>
    <div class="stat orange"><div class="stat-val" id="s-bets">—</div><div class="stat-lbl">Всего ставок</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">🏛 Активные рынки</div>
      <div class="filters">
        <input class="search" placeholder="Поиск..." oninput="filterMarkets(this.value)">
        <select class="filter-select" onchange="filterByCat(this.value)">
          <option value="">Все категории</option>
          <option value="politics">Политика</option>
          <option value="crypto">Крипто</option>
          <option value="sport">Спорт</option>
          <option value="culture">Культура</option>
        </select>
      </div>
    </div>
    <div id="markets-list"><div class="loading">Загрузка...</div></div>
  </div>

  <div class="section">
    <div class="section-header">
      <div class="section-title">📦 Архив закрытых рынков</div>
    </div>
    <div id="archive-list"><div class="loading">Загрузка...</div></div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <div class="modal-icon" id="modal-icon">⚠️</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-confirm" onclick="confirmAction()">Подтвердить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://puwyrjejaaqfhcjwgrog.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1d3lyamVqYWFxZmhjandncm9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjEyOTAsImV4cCI6MjA4ODczNzI5MH0.KYg21yyOfaW73Nu7qmqt_5TLTl0SW6TljxTJHAMoNiA';

async function sb(path, method = 'GET', body = null) {
  const opts = {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : '',
    }
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const res = await fetch(SB_URL + path, opts);
    const text = await res.text();
    if (!res.ok) { console.error('SB error', res.status, text); return null; }
    return text ? JSON.parse(text) : null;
  } catch(e) { console.error('Fetch error:', e); return null; }
}

let allMarkets = [];
let filterText = '';
let filterCat = '';
let confirmCallback = null;

async function init() {
  await Promise.all([loadStats(), loadMarkets(), loadArchive()]);
}

async function loadStats() {
  const [markets, users, txs] = await Promise.all([
    sb('/rest/v1/markets?active=eq.true&select=id'),
    sb('/rest/v1/users?select=telegram_id'),
    sb('/rest/v1/transactions?type=eq.bet&select=amount'),
  ]);
  document.getElementById('s-markets').textContent = markets?.length || 0;
  document.getElementById('s-users').textContent = users?.length || 0;
  document.getElementById('s-bets').textContent = txs?.length || 0;
  const tvl = (txs || []).reduce((s, t) => s + Math.abs(parseFloat(t.amount) || 0), 0);
  document.getElementById('s-tvl').textContent = tvl.toFixed(1);
}

async function loadMarkets() {
  const data = await sb('/rest/v1/markets?active=eq.true&order=id.desc&select=*&limit=200');
  allMarkets = data || [];
  renderMarkets();
}

async function loadArchive() {
  const data = await sb('/rest/v1/markets?active=eq.false&order=id.desc&select=*&limit=50');
  const el = document.getElementById('archive-list');
  if (!data || !data.length) { el.innerHTML = '<div class="empty">Нет закрытых рынков</div>'; return; }
  el.innerHTML = data.map(m => `
    <div class="archive-item">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
        <span style="font-size:18px;">${m.emoji || '🔮'}</span>
        <div style="flex:1;font-weight:500;">${m.title_ru || ''}</div>
        <span class="${m.yes_prob >= 50 ? 'result-yes' : 'result-no'}">${m.yes_prob >= 50 ? '✅ ДА' : '❌ НЕТ'}</span>
      </div>
      <div style="font-size:11px;color:#6b7280;display:flex;gap:16px;">
        <span>ID: ${m.id}</span>
        <span>Объём: ${m.volume || 0} TON</span>
        <span>Ставок: ${m.trades || 0}</span>
      </div>
    </div>
  `).join('');
}

function filterMarkets(v) { filterText = v; renderMarkets(); }
function filterByCat(v) { filterCat = v; renderMarkets(); }

function catBadge(cat) {
  const labels = { politics:'🗳 Политика', crypto:'₿ Крипто', sport:'⚽ Спорт', culture:'🎬 Культура' };
  return `<span class="cat-${cat}">${labels[cat] || cat}</span>`;
}

function renderMarkets() {
  let data = allMarkets;
  if (filterText) data = data.filter(m => (m.title_ru || '').toLowerCase().includes(filterText.toLowerCase()));
  if (filterCat) data = data.filter(m => m.cat === filterCat);
  const el = document.getElementById('markets-list');
  if (!data.length) { el.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }
  el.innerHTML = `<table>
    <thead><tr><th>Рынок</th><th>Кат.</th><th>YES%</th><th>Объём</th><th>Ставок</th><th>Резолюция</th></tr></thead>
    <tbody>${data.map(m => `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:18px;">${m.emoji || '🔮'}</span>
          <div>
            <div class="market-title">${(m.title_ru || '').slice(0, 55)}${(m.title_ru || '').length > 55 ? '…' : ''}</div>
            <div class="market-sub">ID: ${m.id}</div>
          </div>
        </div>
      </td>
      <td>${catBadge(m.cat)}</td>
      <td>
        <div class="prob-bar">
          <div class="prob-track"><div class="prob-fill" style="width:${m.yes_prob || 50}%"></div></div>
          <span>${m.yes_prob || 50}%</span>
        </div>
      </td>
      <td>${m.volume || 0}</td>
      <td>${m.trades || 0}</td>
      <td>
        <div class="actions">
          <button class="btn btn-yes" onclick="resolveMarket(${m.id},'yes')">✅ ДА</button>
          <button class="btn btn-no" onclick="resolveMarket(${m.id},'no')">❌ НЕТ</button>
          <button class="btn btn-pause" onclick="closeMarket(${m.id})">⏸</button>
        </div>
      </td>
    </tr>`).join('')}
    </tbody></table>`;
}

async function resolveMarket(marketId, winningSide) {
  const market = allMarkets.find(m => m.id === marketId);
  const title = (market?.title_ru || 'ID ' + marketId).slice(0, 70);
  const sideLabel = winningSide === 'yes' ? '✅ ДА' : '❌ НЕТ';

  showModal('🏆', `Резолюция: ${sideLabel} победило?`,
    `"${title}"\n\nПобедители получат выплаты автоматически.`,
    async () => {
      showToast('⏳ Обрабатываем...', '');
      console.log('RESOLVE', marketId, winningSide);

      try {
        // 1. Закрываем рынок
        await sb(`/rest/v1/markets?id=eq.${marketId}`, 'PATCH', {
          active: false,
          yes_prob: winningSide === 'yes' ? 95 : 5
        });

        // 2. Загружаем ВСЕ ставки с пагинацией (Supabase лимит 1000 за раз)
        let allTx = [];
        let offset = 0;
        while (true) {
          const batch = await sb(`/rest/v1/transactions?type=eq.bet&select=telegram_id,amount,comment,status&limit=1000&offset=${offset}`);
          if (!batch || !batch.length) break;
          allTx = allTx.concat(batch);
          if (batch.length < 1000) break;
          offset += 1000;
        }
        
        // Фильтруем только ставки на этот рынок (формат BET:ID:side:amt:payout)
        const marketBets = (allTx || []).filter(tx => {
          const p = (tx.comment || '').split(':');
          // Поддерживаем оба формата: BET:123:yes и BET:123:yes:5:10
          return p[0] === 'BET' && String(p[1]).trim() === String(marketId);
        });
        console.log('All tx:', allTx?.length, 'Bets for market', marketId, ':', marketBets.length);
        console.log('Sample comments:', (allTx||[]).slice(0,5).map(t=>t.comment));

        if (!marketBets.length) {
          showToast('✅ Рынок закрыт. Ставок не было.', 'success');
          await refresh(); return;
        }

        // 3. Пулы — формат BET:marketId:yes/no:amount:payout
        let yesPool = 0, noPool = 0;
        const yesBets = [], noBets = [];
        marketBets.forEach(tx => {
          const p = tx.comment.split(':');
          const side = p[2]; // 'yes' или 'no'
          const amt = Math.abs(parseFloat(tx.amount) || 0);
          console.log('Bet:', tx.telegram_id, side, amt);
          if (side === 'yes') { yesPool += amt; yesBets.push({...tx, amt}); }
          else if (side === 'no') { noPool += amt; noBets.push({...tx, amt}); }
        });

        const totalPool = yesPool + noPool;
        const payoutPool = Math.round(totalPool * 0.98 * 100) / 100;
        const winnerBets = winningSide === 'yes' ? yesBets : noBets;
        const winnerPool = winningSide === 'yes' ? yesPool : noPool;
        console.log('totalPool:', totalPool, 'winners:', winnerBets.length, 'winnerPool:', winnerPool);

        if (!winnerBets.length) {
          showToast(`✅ Закрыто. Победителей (${sideLabel}) нет.`, 'success');
          await refresh(); return;
        }

        // 4. Выплаты
        let count = 0;
        for (const tx of winnerBets) {
          const share = winnerPool > 0 ? tx.amt / winnerPool : 0;
          const payout = Math.round(payoutPool * share * 100) / 100;
          if (payout <= 0) continue;

          const ud = await sb(`/rest/v1/users?telegram_id=eq.${tx.telegram_id}&select=balance`);
          const bal = parseFloat(ud?.[0]?.balance || 0);
          const newBal = Math.round((bal + payout) * 100) / 100;

          await sb(`/rest/v1/users?telegram_id=eq.${tx.telegram_id}`, 'PATCH', { balance: newBal });
          await sb('/rest/v1/transactions', 'POST', {
            telegram_id: tx.telegram_id,
            amount: payout,
            type: 'payout',
            comment: `PAYOUT:${marketId}:${winningSide}:${payout}`,
            status: 'completed'
          });
          count++;
          console.log('Paid', payout, 'to', tx.telegram_id, '→', newBal);
        }

        showToast(`✅ ${count} победителей получили выплаты! Пул: ${totalPool.toFixed(2)} TON`, 'success');
        await refresh();
      } catch(e) {
        console.error('Resolve error:', e);
        // Генерируем SQL для ручного выполнения как запасной вариант
        const fallbackSql = `-- Закрыть рынок #${marketId} вручную\nUPDATE markets SET active = false, yes_prob = ${winningSide === 'yes' ? 95 : 5} WHERE id = ${marketId};\n-- Возврат ставок если нет противоположных ставок:\n-- UPDATE users SET balance = balance + ABS(amount) FROM transactions WHERE transactions.telegram_id = users.telegram_id AND transactions.comment LIKE 'BET:${marketId}:%' AND transactions.type = 'bet';`;
        try { await navigator.clipboard.writeText(fallbackSql); } catch(_) {}
        showToast('❌ Ошибка API. SQL скопирован — вставьте в Supabase SQL Editor', 'error');
        alert('Скопируйте в Supabase SQL Editor:\n\n' + fallbackSql);
      }
    }
  );
}

async function closeMarket(marketId) {
  showModal('⏸', 'Закрыть рынок?', 'Рынок деактивируется без выплат.', async () => {
    await sb(`/rest/v1/markets?id=eq.${marketId}`, 'PATCH', { active: false });
    showToast('Рынок закрыт', 'success');
    await refresh();
  });
}

async function refresh() {
  await Promise.all([loadStats(), loadMarkets(), loadArchive()]);
}

function showModal(icon, title, sub, cb) {
  document.getElementById('modal-icon').textContent = icon;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-sub').textContent = sub;
  confirmCallback = cb;
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('show');
  confirmCallback = null;
}
function confirmAction() {
  const cb = confirmCallback; // сохраняем ДО закрытия модала
  closeModal();
  if (cb) cb();
}
document.getElementById('modal-bg').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 4000);
}

init();
</script>
</body>
</html>
